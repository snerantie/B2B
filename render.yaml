# Render Blueprint - deploys the backend web service + a managed PostgreSQL database.
# In Render: New + -> "Blueprint" -> connect this repo -> it reads this file.
services:
  - type: web
    name: b2b-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: b2b-db
          property: connectionString
      # Set this to your Vercel URL after the frontend is deployed
      - key: CLIENT_URL
        sync: false

databases:
  - name: b2b-db
    plan: free
